# ============================================
# Ghost ActivityPub — Caddy リバースプロキシ設定
# ============================================
# この設定を既存の Caddyfile の nowpattern.com ブロック内に追加する。
# 既存の Ghost プロキシ設定の **前** に配置すること（Caddy は上から順に評価）。
#
# 手順:
#   1. ssh root@163.44.124.123
#   2. nano /etc/caddy/Caddyfile
#   3. nowpattern.com ブロック内の先頭に以下を追加
#   4. systemctl reload caddy
#   5. Ghost管理画面 → Settings → Growth → Network → ActivityPub を有効化
#   6. 確認: curl https://nowpattern.com/.ghost/activitypub/health
#
# 制限（Hosted Gateway）:
#   - 100 インタラクション/日
#   - 2,000 フォロワー上限
#   - 2,000 フォロー上限
#   → Phase 1 には十分。超えたら Self-Hosted Container に移行。
# ============================================

# --- ここから Caddyfile に追加 ---

# ActivityPub API routes (MUST be BEFORE the main Ghost proxy)
handle /.ghost/activitypub/* {
    reverse_proxy https://ap.ghost.org {
        header_up Host {http.request.host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
        header_up Authorization {http.request.header.Authorization}
    }
}

# WebFinger discovery (required for fediverse @index@nowpattern.com)
handle /.well-known/webfinger {
    reverse_proxy https://ap.ghost.org {
        header_up Host {http.request.host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
    }
}

# NodeInfo (fediverse server metadata)
handle /.well-known/nodeinfo {
    reverse_proxy https://ap.ghost.org {
        header_up Host {http.request.host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
    }
}

# --- ここまで ---
# 既存の handle { reverse_proxy localhost:2368 } はこの後に置く
