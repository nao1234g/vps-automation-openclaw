# retirement_registry.yaml
# -----------------------------------------------------------
# 退役済み artifact の唯一の機械可読定義。
# ここに載っているものを「current source of truth」として復活させてはならない。
# audit_retired_refs.py がこのリストを参照して grep チェックを行う。
# -----------------------------------------------------------
# Generated: NO (human-edited canonical policy file)
# Last updated: 2026-03-14

format_version: "1.0"

##############################################################
# 退役手順（標準プロセス）
##############################################################

retirement_procedure:
  steps:
    1: "rename to tombstone (e.g., file.md → file.md.retired-YYYYMMDD)"
    2: "retirement_registry.yaml に追記"
    3: "repo-wide grep で旧パスの参照を検出し是正"
    4: "影響を受ける human-facing docs に tombstone note を追加"
    5: "generated artifact の generator 側を修正"
    6: "rollback point (git commit) を作成"

##############################################################
# 退役済み artifacts
##############################################################

retired_artifacts:

  - id: "opt-claude-md-20260314"
    original_path: "/opt/CLAUDE.md"
    tombstone_path: "/opt/CLAUDE.md.retired-20260314"
    retired_date: "2026-03-14"
    reason: "VPS共通マスター指示書として機能していたが、NEO-ONE/TWOが直接sdk_integration.pyのneo_system_promptを使う構造に移行。/opt/CLAUDE.mdは誰にも読まれていなかった。"
