      local_grep: "残存参照3件（NORTH_STAR.md, infrastructure.md, execution-map.md）→ 退役注記済み"
    affected_files_fixed:
      - "/opt/shared/rules/NORTH_STAR.md"
      - "/opt/shared/rules/infrastructure.md"
      - "/opt/shared/scripts/generate_shared_state.py"
      - "/opt/shared/scripts/agent_consistency_validator.py"
      - "/opt/openclaw/.claude/CLAUDE.md"
      - "/opt/shared/AGENT_WISDOM.md"
      - ".claude/rules/NORTH_STAR.md"
      - ".claude/rules/infrastructure.md"
      - ".claude/rules/execution-map.md"
    rollback:
      cmd: "ssh root@163.44.124.123 'cp /opt/CLAUDE.md.retired-20260314 /opt/CLAUDE.md'"
      note: "ただし復活させる正当な理由はない"

  - id: "aisa-pipeline-suspended"
    original_path: "N/A (cron jobs)"
    tombstone_path: "N/A"
    retired_date: "2026-02-22"
    reason: "AISAパイプライン（19 cron jobs）をSUSPENDEDにした。AISAブランドはNowpatternに統合済み。"
