##############################################################
# audit_retired_refs.py が検索するパターン
##############################################################

grep_patterns:
  - pattern: "/opt/CLAUDE.md"
    severity: "ERROR"
    note: "退役済みパスへの参照。tombstone pathへの参照は OK"
    allow_pattern: "/opt/CLAUDE.md.retired"  # これはOK

  - pattern: "@aisaintel"
    severity: "ERROR"
    note: "削除済みXアカウント。参照禁止。"

  - pattern: "aisaintel"
    severity: "WARNING"
    note: "AISA関連の参照。AISAブランドは廃止済み。"

  - pattern: "AISA パイプライン"
    severity: "WARNING"
    note: "廃止済みパイプライン名。"
